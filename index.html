<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Is Blooming ✨</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Optional Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <!-- Background layer -->
    <div class="scene">
        <div class="stars"></div>
        <div class="glow"></div>
    </div>

    <!-- Main container -->
    <main class="container">

        <header class="hero">
            <h1 class="title">Flower Is Blooming 🌸</h1>
            <p class="subtitle">Every bloom begins in silence, grows in patience.</p>
        </header>

        <!-- Garden -->
        <section class="garden">

            <div class="flower-wrapper">
                <div class="flower f1">
                    <div class="stem"></div>
                    <div class="leaves"></div>
                    <div class="petals"></div>
                    <div class="center"></div>
                </div>
            </div><div class="flower f2">
                    <div class="stem"></div>
                    <div class="leaves"></div>
                    <div class="petals"></div>
                    <div class="center"></div>
                </div>
            </div>

            <div class="flower-wrapper">
                <div class="flower f3">
                    <div class="stem"></div>
                    <div class="leaves"></div>
                    <div class="petals"></div>
                    <div class="center"></div>
                </div>
            </div>

            <div class="flower-wrapper">
                <div class="flower f4">
                    <div class="stem"></div>
                    <div class="leaves"></div>
                    <div class="petals"></div>
                    <div class="center"></div>
                </div>
            </div>

        </section>

        <!-- Message section -->
        <section class="message">
            <h2>Keep Growing 🌷</h2>
            <p>
                Like flowers, we bloom at our own pace.  
                Trust your journey, even when it feels slow.
            </p>
        </section>

    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
